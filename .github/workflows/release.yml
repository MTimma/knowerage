name: Release
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            npm_pkg: knowerage-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            npm_pkg: knowerage-linux-arm64-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
            npm_pkg: knowerage-darwin-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            npm_pkg: knowerage-darwin-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            npm_pkg: knowerage-win32-x64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            npm_pkg: knowerage-win32-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Linux ARM64 cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
      - name: Copy binary to npm package
        shell: bash
        run: |
          BIN_NAME="knowerage-mcp"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then BIN_NAME="knowerage-mcp.exe"; fi
          cp "target/${{ matrix.target }}/release/$BIN_NAME" "npm/${{ matrix.npm_pkg }}/"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.npm_pkg }}
          path: npm/${{ matrix.npm_pkg }}/

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: knowerage-*
          path: npm
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Publish platform packages
        run: |
          set -euo pipefail
          # npm can return 409 if the next publish runs before the registry finishes
          # the previous packument. Space publishes out and retry transient failures.
          npm_publish_retry() {
            local dir="$1"
            local attempt=1
            local max=6
            local base_wait=20
            while [ "$attempt" -le "$max" ]; do
              if (cd "$dir" && npm publish --access public); then
                return 0
              fi
              code=$?
              if [ "$attempt" -eq "$max" ]; then
                echo "npm publish failed in $dir after $max attempts (last exit $code)" >&2
                return "$code"
              fi
              w=$((base_wait * attempt))
              echo "Publish attempt $attempt failed; waiting ${w}s before retry..."
              sleep "$w"
              attempt=$((attempt + 1))
            done
          }
          first=1
          for pkg in $(for d in npm/knowerage-*/; do printf '%s\n' "$d"; done | sort); do
            if [ "$first" -ne 1 ]; then
              echo "Waiting before next platform package (registry processing)..."
              sleep 20
            fi
            npm_publish_retry "$pkg"
            first=0
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish main package
        run: |
          set -euo pipefail
          attempt=1
          max=6
          base_wait=20
          while [ "$attempt" -le "$max" ]; do
            if (cd npm/knowerage && npm publish --access public); then
              exit 0
            fi
            code=$?
            if [ "$attempt" -eq "$max" ]; then
              echo "npm publish failed for main package after $max attempts (last exit $code)" >&2
              exit "$code"
            fi
            w=$((base_wait * attempt))
            echo "Publish attempt $attempt failed; waiting ${w}s before retry..."
            sleep "$w"
            attempt=$((attempt + 1))
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
